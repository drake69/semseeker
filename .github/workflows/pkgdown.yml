# Build pkgdown site and deploy to gh-pages
# Triggered on push to main/master (production) or manually
on:
  push:
    branches: [main, master]
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: macos-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      RENV_CONFIG_SANDBOX_ENABLED: false
      RENV_ACTIVATE_PROJECT: 0
      NOT_CRAN: "true"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install system libraries (macOS)
        run: brew install cairo fontconfig pkg-config

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        run: |
          Sys.setenv(NOT_CRAN = "true")
          install.packages(
            c("remotes", "pkgdown", "devtools"),
            repos = "https://packagemanager.posit.co/cran/latest"
          )
          remotes::install_deps(
            dependencies = NA,
            repos = c(
              rpolars = "https://community.r-multiverse.org",
              CRAN    = "https://packagemanager.posit.co/cran/latest"
            )
          )
        shell: Rscript {0}

      - name: Build pkgdown site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
          clean: true
