# CI: R CMD check + testthat on Windows, macOS, Linux
on:
  push:
    branches-ignore: [main, master]   # direct push to main/master is blocked
  pull_request:
    branches: [main, master, develop]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      RENV_CONFIG_SANDBOX_ENABLED: false
      RENV_ACTIVATE_PROJECT: 0
      # Required by polars installer
      NOT_CRAN: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      # polars is not on CRAN — install from community r-multiverse before
      # setup-r-dependencies runs, so pak can resolve the Imports entry.
      - name: Install polars
        run: |
          Sys.setenv(NOT_CRAN = "true")
          install.packages("polars", repos = "https://community.r-multiverse.org")
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::testthat, any::devtools
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
