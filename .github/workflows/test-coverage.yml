# Coverage: run covr on macOS and upload to Codecov
on:
  push:
    branches-ignore: [main, master]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:   # allow manual trigger: gh workflow run test-coverage.yml

name: test-coverage

jobs:
  coverage:
    runs-on: macos-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      RENV_CONFIG_SANDBOX_ENABLED: false
      RENV_ACTIVATE_PROJECT: 0
      NOT_CRAN: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      # gdtools (transitive dep via ctdR → clusterProfiler) requires cairo + fontconfig
      - name: Install system libraries (macOS)
        run: brew install cairo fontconfig pkg-config

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        run: |
          Sys.setenv(NOT_CRAN = "true")
          install.packages(
            c("remotes", "covr", "testthat", "devtools"),
            repos = "https://packagemanager.posit.co/cran/latest"
          )
          remotes::install_deps(
            dependencies = NA,   # Imports/Depends/LinkingTo only; skip Suggests
            repos = c(           # (pathfindR → ggkegg Bioconductor chain not resolvable from CRAN)
              rpolars = "https://community.r-multiverse.org",
              CRAN    = "https://packagemanager.posit.co/cran/latest"
            )
          )
        shell: Rscript {0}

      - name: Generate coverage report
        run: |
          Sys.setenv(NOT_CRAN = "true", RENV_CONFIG_SANDBOX_ENABLED = "false")
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov)
        shell: Rscript {0}

      - name: Show test failure output
        if: failure()
        run: |
          find "$RUNNER_TEMP/package" -name "*.Rout.fail" -exec echo "=== {} ===" \; -exec cat {} \;
        shell: bash

      - uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
          files: ./cobertura.xml
          plugins: noop
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
